<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border: 3px solid #333;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .player {
            position: absolute;
            width: 30px;
            height: 40px;
            background: red;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        .platform {
            position: absolute;
            background: #8B4513;
            border: 2px solid #654321;
            border-radius: 5px;
        }

        .coin {
            position: absolute;
            width: 20px;
            height: 20px;
            background: gold;
            border-radius: 50%;
            border: 2px solid orange;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .enemy {
            position: absolute;
            width: 35px;
            height: 35px;
            background: #FF6347;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border: 2px solid #DC143C;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #333;
            font-size: 16px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 15px;
            border-radius: 5px;
            z-index: 100;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 200;
            min-width: 300px;
        }

        #gameOver h1 {
            margin-bottom: 20px;
            font-size: 32px;
        }

        #gameOver p {
            margin: 10px 0;
            font-size: 18px;
        }

        #gameOver button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #gameOver button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="hud">
            <div>Монеты: <span id="coins">0</span></div>
            <div>Здоровье: <span id="health">3</span></div>
            <div>Уровень: <span id="level">1</span></div>
        </div>
        <div id="gameOver">
            <h1>GAME OVER</h1>
            <p id="gameOverText">Твой счет: 0</p>
            <button onclick="location.reload()">Играть снова</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('gameContainer');
        const gameOverDiv = document.getElementById('gameOver');
        const coinsDisplay = document.getElementById('coins');
        const healthDisplay = document.getElementById('health');
        const levelDisplay = document.getElementById('level');
        const gameOverText = document.getElementById('gameOverText');

        const game = {
            width: 800,
            height: 600,
            coins: 0,
            health: 3,
            level: 1,
            isGameOver: false,
            player: {
                x: 50,
                y: 400,
                width: 30,
                height: 40,
                velocityX: 0,
                velocityY: 0,
                speed: 5,
                jumpPower: 15,
                isJumping: false
            },
            keys: {}
        };

        const platforms = [
            { x: 0, y: 550, width: 800, height: 50 }, // Пол
            { x: 100, y: 480, width: 150, height: 20 },
            { x: 350, y: 420, width: 150, height: 20 },
            { x: 600, y: 380, width: 150, height: 20 },
            { x: 150, y: 320, width: 150, height: 20 },
            { x: 500, y: 280, width: 150, height: 20 }
        ];

        let coins = [
            { x: 125, y: 450 },
            { x: 425, y: 390 },
            { x: 675, y: 350 },
            { x: 225, y: 290 },
            { x: 575, y: 250 },
            { x: 400, y: 200 }
        ];

        let enemies = [
            { x: 200, y: 450, velocityX: 2, minX: 100, maxX: 250 },
            { x: 500, y: 350, velocityX: -2, minX: 400, maxX: 700 },
            { x: 300, y: 250, velocityX: 2.5, minX: 150, maxX: 550 }
        ];

        function createPlayer() {
            const player = document.createElement('div');
            player.className = 'player';
            player.id = 'player';
            player.innerHTML = '▲';
            player.style.left = game.player.x + 'px';
            player.style.top = game.player.y + 'px';
            container.appendChild(player);
        }

        function createPlatforms() {
            platforms.forEach(platform => {
                const div = document.createElement('div');
                div.className = 'platform';
                div.style.left = platform.x + 'px';
                div.style.top = platform.y + 'px';
                div.style.width = platform.width + 'px';
                div.style.height = platform.height + 'px';
                container.appendChild(div);
            });
        }

        function createCoins() {
            coins.forEach((coin, index) => {
                const div = document.createElement('div');
                div.className = 'coin';
                div.id = 'coin-' + index;
                div.style.left = coin.x + 'px';
                div.style.top = coin.y + 'px';
                div.innerHTML = '$';
                container.appendChild(div);
            });
        }

        function createEnemies() {
            enemies.forEach((enemy, index) => {
                const div = document.createElement('div');
                div.className = 'enemy';
                div.id = 'enemy-' + index;
                div.style.left = enemy.x + 'px';
                div.style.top = enemy.y + 'px';
                div.innerHTML = '●';
                container.appendChild(div);
            });
        }

        function updatePlayer() {
            // Движение влево/вправо
            if (game.keys['ArrowLeft'] || game.keys['a'] || game.keys['A']) {
                game.player.velocityX = -game.player.speed;
            } else if (game.keys['ArrowRight'] || game.keys['d'] || game.keys['D']) {
                game.player.velocityX = game.player.speed;
            } else {
                game.player.velocityX = 0;
            }

            // Прыжок
            if ((game.keys['ArrowUp'] || game.keys['w'] || game.keys['W'] || game.keys[' ']) && !game.player.isJumping) {
                game.player.velocityY = -game.player.jumpPower;
                game.player.isJumping = true;
            }

            // Применение гравитации
            game.player.velocityY += 0.6;

            // Ограничение максимальной скорости падения
            if (game.player.velocityY > 15) {
                game.player.velocityY = 15;
            }

            // Обновление позиции
            game.player.x += game.player.velocityX;
            game.player.y += game.player.velocityY;

            // Границы экрана
            if (game.player.x < 0) game.player.x = 0;
            if (game.player.x + game.player.width > game.width) {
                game.player.x = game.width - game.player.width;
            }

            // Проверка коллизий с платформами
            let isOnPlatform = false;
            platforms.forEach(platform => {
                if (game.player.velocityY >= 0 &&
                    game.player.y + game.player.height <= platform.y + 10 &&
                    game.player.y + game.player.height >= platform.y - 10 &&
                    game.player.x + game.player.width > platform.x &&
                    game.player.x < platform.x + platform.width) {
                    game.player.velocityY = 0;
                    game.player.y = platform.y - game.player.height;
                    game.player.isJumping = false;
                    isOnPlatform = true;
                }
            });

            // Если упал с экрана
            if (game.player.y > game.height) {
                game.health--;
                if (game.health <= 0) {
                    endGame();
                } else {
                    game.player.x = 50;
                    game.player.y = 400;
                    game.player.velocityY = 0;
                }
            }

            // Обновление отображения
            document.getElementById('player').style.left = game.player.x + 'px';
            document.getElementById('player').style.top = game.player.y + 'px';
            healthDisplay.textContent = game.health;
        }

        function updateEnemies() {
            enemies.forEach((enemy, index) => {
                enemy.x += enemy.velocityX;

                if (enemy.x <= enemy.minX || enemy.x >= enemy.maxX) {
                    enemy.velocityX *= -1;
                }

                // Проверка коллизии с игроком
                if (checkCollision(game.player, {
                    x: enemy.x,
                    y: enemy.y,
                    width: 35,
                    height: 35
                })) {
                    game.health--;
                    if (game.health <= 0) {
                        endGame();
                    } else {
                        game.player.x = 50;
                        game.player.y = 400;
                        game.player.velocityY = 0;
                    }
                }

                const enemyDiv = document.getElementById('enemy-' + index);
                if (enemyDiv) {
                    enemyDiv.style.left = enemy.x + 'px';
                }
            });
        }

        function updateCoins() {
            coins.forEach((coin, index) => {
                const coinDiv = document.getElementById('coin-' + index);
                if (coinDiv && checkCollision(game.player, coin)) {
                    game.coins++;
                    coinDiv.remove();
                    coins.splice(index, 1);
                    coinsDisplay.textContent = game.coins;

                    // Увеличение сложности каждые 5 монет
                    if (game.coins % 5 === 0) {
                        game.level++;
                        levelDisplay.textContent = game.level;
                        enemies.forEach(enemy => {
                            enemy.velocityX *= 1.1;
                        });
                    }
                }
            });
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + 20 &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + 20 &&
                   rect1.y + rect1.height > rect2.y;
        }

        function endGame() {
            game.isGameOver = true;
            gameOverDiv.style.display = 'block';
            gameOverText.textContent = `Твой счет: ${game.coins} монет`;
        }

        function gameLoop() {
            if (!game.isGameOver) {
                updatePlayer();
                updateEnemies();
                updateCoins();
            }
            requestAnimationFrame(gameLoop);
        }

        // Обработка клавиш
        document.addEventListener('keydown', (e) => {
            game.keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            game.keys[e.key] = false;
        });

        // Запуск игры
        createPlayer();
        createPlatforms();
        createCoins();
        createEnemies();
        gameLoop();
    </script>
</body>
</html>
